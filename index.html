<style>
  :root{
    --accent:#32AADD;
    --bg-deep:#050914;
    --bg-mid:#0b1530;
    --card-bg:#0f1c3d;
    --text:#eaf2fb;
    --muted:#7d92b8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg-deep);
    color:var(--text);
    font-family:'Segoe UI', Tahoma, Arial, sans-serif;
    overflow:hidden;
    position:relative;
    height:100vh;
    width:100vw;
  }

  .bg-glow{
    position:fixed; inset:0; z-index:0; overflow:hidden;
    background:radial-gradient(ellipse at 50% 100%, #0d2a55 0%, var(--bg-mid) 40%, var(--bg-deep) 100%);
  }
  .blob{
    position:absolute; border-radius:50%; filter:blur(90px); opacity:.55;
    animation:drift 16s ease-in-out infinite;
  }
  .blob1{width:420px; height:420px; background:#1c6fb8; top:-100px; left:-80px; animation-name:drift1; animation-duration:20s;}
  .blob2{width:360px; height:360px; background:#32AADD; bottom:-120px; right:-60px; animation-name:drift2; animation-duration:24s; animation-delay:-4s;}
  .blob3{width:300px; height:300px; background:#5a3fc0; top:40%; left:60%; opacity:.35; animation-name:drift3; animation-duration:28s; animation-delay:-8s;}
  @keyframes drift1{
    0%{transform:translate(0,0) scale(1);}
    25%{transform:translate(30vw,15vh) scale(1.2);}
    50%{transform:translate(15vw,45vh) scale(.9);}
    75%{transform:translate(-10vw,20vh) scale(1.1);}
    100%{transform:translate(0,0) scale(1);}
  }
  @keyframes drift2{
    0%{transform:translate(0,0) scale(1);}
    25%{transform:translate(-25vw,-20vh) scale(1.15);}
    50%{transform:translate(-45vw,-5vh) scale(.85);}
    75%{transform:translate(-15vw,-35vh) scale(1.05);}
    100%{transform:translate(0,0) scale(1);}
  }
  @keyframes drift3{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-20vw,-25vh) scale(1.3);}
  }

  .screen{
    position:absolute; top:0; left:0; z-index:2;
    height:100vh; width:100vw;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    opacity:0; visibility:hidden;
    transform:scale(.96);
    transition:opacity .6s ease, transform .6s ease, visibility 0s .6s;
    padding:20px;
  }
  .screen.active{
    opacity:1; visibility:visible; transform:scale(1);
    transition:opacity .6s ease, transform .6s ease;
  }

  .name-title{
    font-family:'Times New Roman', Georgia, serif;
    font-weight:700;
    font-size:clamp(2.4rem, 8vw, 4.5rem);
    color:var(--accent);
    text-shadow:0 4px 24px rgba(50,170,221,.55), 0 2px 2px rgba(0,0,0,.6);
    letter-spacing:1px;
    line-height:1.15;
    margin-bottom:34px;
    animation:fadeUp 1s ease .1s both;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(18px);}
    to{opacity:1; transform:translateY(0);}
  }
  .enter-btn{
    background:transparent;
    border:1.5px solid var(--accent);
    color:var(--accent);
    padding:12px 34px;
    border-radius:40px;
    font-size:1rem;
    letter-spacing:.5px;
    cursor:pointer;
    transition:all .25s ease;
    animation:fadeUp 1s ease .4s both, pulse 2.4s ease-in-out infinite 1.4s;
  }
  .enter-btn:hover{background:var(--accent); color:#04101f; box-shadow:0 0 24px rgba(50,170,221,.6);}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 rgba(50,170,221,0);}
    50%{box-shadow:0 0 18px rgba(50,170,221,.45);}
  }

  .hub-center{margin-bottom:38px;}
  .avatar{
    width:88px; height:88px; border-radius:50%;
    margin:0 auto 16px; box-shadow:0 0 30px rgba(50,170,221,.5);
    overflow:hidden;
    border:2px solid rgba(50,170,221,.6);
  }
  .avatar img{width:100%; height:100%; object-fit:cover; display:block;}
  .hub-center h2{
    font-family:'Times New Roman', Georgia, serif;
    font-size:1.6rem; color:var(--text); font-weight:600;
  }
  .hub-center .subtitle{color:var(--muted); font-size:.85rem; margin-top:6px;}

  .icon-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:22px 24px;
    max-width:400px;
    width:100%;
  }
  .icon-card{
    width:110px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:16px 8px 12px;
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    transition:transform .25s ease, background .25s ease, border-color .25s ease;
    color:var(--text);
  }
  .icon-card:hover{transform:translateY(-6px); background:rgba(255,255,255,.06); border-color:var(--accent);}
  .icon-circle{
    width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.35rem;
    background:#fff;
    box-shadow:0 0 16px rgba(0,0,0,.35);
    overflow:hidden;
  }
  .icon-circle img{width:70%; height:70%; object-fit:contain;}
  .icon-circle.emoji{background:rgba(255,255,255,.08);}
  .icon-card span{font-size:.78rem; color:var(--muted);}

  @media(max-width:480px){
    .icon-grid{grid-template-columns:repeat(3,1fr); gap:16px;}
  }

  .overlay{
    position:fixed; inset:0; z-index:10;
    background:rgba(2,6,18,.72);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .35s ease, visibility 0s .35s;
  }
  .overlay.active{
    opacity:1; visibility:visible; pointer-events:auto;
    transition:opacity .35s ease;
  }
  .card{
    background:var(--card-bg);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:40px 32px 32px;
    width:90%; max-width:340px;
    text-align:center;
    position:relative;
    transform:scale(.85) translateY(20px);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .overlay.active .card{transform:scale(1) translateY(0);}

  .back-btn{
    position:absolute; top:16px; left:16px;
    width:34px; height:34px; border-radius:50%;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    color:var(--text);
    font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .back-btn:hover{background:rgba(255,255,255,.14); animation:spin360 .5s ease;}
  @keyframes spin360{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }

  .card-icon{
    width:84px; height:84px; border-radius:50%;
    margin:0 auto 20px;
    display:flex; align-items:center; justify-content:center;
    font-size:2.4rem;
    background:#fff;
    box-shadow:0 0 30px rgba(0,0,0,.4);
    overflow:hidden;
  }
  .card-icon img{width:68%; height:68%; object-fit:contain;}
  .card-icon.emoji{background:rgba(255,255,255,.08);}
  .card h2{
    font-family:'Times New Roman', Georgia, serif;
    font-size:1.5rem; color:var(--accent);
    text-shadow:0 2px 14px rgba(50,170,221,.4);
    margin-bottom:8px;
  }
  .card p{color:var(--muted); font-size:.95rem; margin-bottom:26px; word-break:break-all;}
  .open-btn{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--accent); color:#04101f;
    padding:12px 28px; border-radius:40px;
    text-decoration:none; font-weight:600; font-size:.92rem;
    transition:all .25s ease;
  }
  .open-btn:hover{box-shadow:0 0 22px rgba(50,170,221,.6); transform:translateY(-2px);}
</style>
</head>

  };

  const contacts = [
    { key:"telegram", img:ICONS.telegram, title:"Telegram", value:"@manizamzami", link:"https://t.me/manizamzami", action:"Open" },
    { key:"whatsapp", img:ICONS.whatsapp, title:"WhatsApp", value:"+98 991 905 2597", link:"https://wa.me/989919052597", action:"Open" },
    { key:"email",    img:ICONS.email,    title:"Email",    value:"manizamzami@gmail.com", link:"https://mail.google.com/mail/?view=cm&fs=1&to=manizamzami@gmail.com", action:"Send Email" },
    { key:"bale",     img:ICONS.bale,     title:"Bale",     value:"@manizamzami", link:"https://ble.ir/manizamzami", action:"Open" },
    { key:"eitaa",    img:ICONS.eitaa,    title:"Eitaa",    value:"@manizamzami", link:"https://eitaa.com/manizamzami", action:"Open" }
  ];

  const grid = document.getElementById('iconGrid');
  contacts.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'icon-card';
    const inner = c.img
      ? `<div class="icon-circle"><img src="${c.img}" alt="${c.title}"></div>`
      : `<div class="icon-circle emoji">${c.icon}</div>`;
    btn.innerHTML = `${inner}<span>${c.title}</span>`;
    btn.addEventListener('click', () => openCard(c));
    grid.appendChild(btn);
  });

  const intro = document.getElementById('intro');
  const hub = document.getElementById('hub');
  const overlay = document.getElementById('overlay');
  const cardIcon = document.getElementById('cardIcon');
  const cardTitle = document.getElementById('cardTitle');
  const cardValue = document.getElementById('cardValue');
  const cardAction = document.getElementById('cardAction');

  document.getElementById('enterBtn').addEventListener('click', () => {
    intro.classList.remove('active');
    hub.classList.add('active');
  });

  function openCard(c){
    if(c.img){
      cardIcon.className = 'card-icon';
      cardIcon.innerHTML = `<img src="${c.img}" alt="${c.title}">`;
    } else {
      cardIcon.className = 'card-icon emoji';
      cardIcon.textContent = c.icon;
    }
    cardTitle.textContent = c.title;
    cardValue.textContent = c.value;
    cardAction.textContent = c.action + ' ↗';
    cardAction.href = c.link;
    overlay.classList.add('active');
  }

  function closeCard(){
    overlay.classList.remove('active');
  }

  document.getElementById('closeCard').addEventListener('click', closeCard);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) closeCard(); });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeCard(); });
</script>
